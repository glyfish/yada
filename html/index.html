<body>
    <h2>YADA</h2>

    <script type="module">
        import van from "./vendor/van-1.5.5.min.js";
        import { marked } from "./vendor/marked.esm.js";

        marked.setOptions({
            highlight(code, lang) {
                if (window.hljs && lang && window.hljs.getLanguage(lang)) {
                return window.hljs.highlight(code, { language: lang }).value;
                }
                // Fallback: auto-detect if lang missing/unknown
                return window.hljs ? window.hljs.highlightAuto(code).value : code;
            },
            gfm: true,
            breaks: false
        });

        // Protect LaTeX so Marked won't touch underscores/dollars.
        // Order matters: $$...$$ first, then $...$, then \( \), then \[ \]
        // (No lookbehind — works in all modern browsers.)
        function protectMathBlocks(md) {
            const blocks = [];
            const token = i => `@@MATH${i}@@`;
            const re = /(\$\$[\s\S]*?\$\$)|(\$[\s\S]*?\$)|\\\([\s\S]*?\\\)|\\\[[\s\S]*?\\\]/g;
            const text = String(md || "").replace(re, m => {
                const t = token(blocks.length);
                blocks.push(m);
                return t;
            });
            return { text, blocks };
        }

        // Restore tokens with minimal HTML escaping so < and > inside math
        // don't get parsed as tags before MathJax typesets them.
        function restoreMathTokens(html, blocks) {
            let out = String(html || "");
             const esc = s => s
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            blocks.forEach((m, i) => {
                const t = `@@MATH${i}@@`;
                out = out.split(t).join(esc(m));
            });
            return out;
        }

        // --- Render markdown + code highlight + MathJax ---
        function renderMarkdown(mdText) {
            const el = document.querySelector(".markdown-output");
            if (!el) return;

            // Protect → parse → restore
            const { text, blocks } = protectMathBlocks(mdText || "");
            let html = marked.parse(text);
            html = restoreMathTokens(html, blocks);

            el.innerHTML = html;

            // Code highlight
            if (window.hljs) {
                el.querySelectorAll("pre code").forEach(b => window.hljs.highlightElement(b));
            }

            // MathJax
            if (window.MathJax?.typesetPromise) {
                if (window.MathJax.typesetClear) window.MathJax.typesetClear([el]);
                window.MathJax.typesetPromise([el]).catch(() => {});
            }
        }
        
        const { div, span, textarea, button, h3 } = van.tags;
        const { add, state } = van;

        const textValue = state("");
        const isLoading = state(false);
        const statusText = state("");
        const feedCount = state(0);
        const sessionId = state(null);

        let inputTextareaEl;

        const YADA_REQUEST_STREAM = "/api/request/stream";
        const YADA_REQUEST_RESUME = "/api/request/resume";

        const FEED_MAX_CARDS = 40;
        const FEED_MAX_CHARS = 80000;

        // ===== Human-in-the-loop: resume helper and form dialog =====

        async function handleResumeRequest(resumeSessionId, formData, promptLabel) {
            isLoading.val = true;
            statusText.val = "Processing...";
            try {
                const response = await fetch(YADA_REQUEST_RESUME, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ session_id: resumeSessionId, form_data: formData })
                });
                if (!response.ok) {
                    let msg = `Resume failed (${response.status})`;
                    try { const e = await response.json(); msg = e?.detail || e?.message || msg; } catch (_) {}
                    throw new Error(msg);
                }
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                let currentEvent = "message";
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (line.startsWith("event:")) {
                            currentEvent = line.slice(6).trim();
                        } else if (line.startsWith("data:")) {
                            const raw = line.slice(5).trim();
                            let parsed;
                            try { parsed = JSON.parse(raw); } catch (_) { continue; }
                            if (currentEvent === "status" && parsed.text) {
                                statusText.val = parsed.text;
                            } else if (currentEvent === "result") {
                                statusText.val = "";
                                isLoading.val = false;
                                if (parsed.session_id) sessionId.val = parsed.session_id;
                                await prependResultCard(promptLabel, parsed.result ?? "");
                                textValue.val = "";
                                if (inputTextareaEl) {
                                    inputTextareaEl.value = "";
                                    inputTextareaEl.style.height = "auto";
                                }
                            } else if (currentEvent === "error") {
                                throw new Error(parsed.message || "Unknown resume error");
                            }
                            currentEvent = "message";
                        }
                    }
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                isLoading.val = false;
                statusText.val = "";
            }
        }

                        <textarea id="rn-topic" name="topic" rows="3" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="e.g., Signal Processing" required></textarea>

                        <label for="rn-shelf">Shelf:</label>
                        <input id="rn-shelf" name="shelf" type="text" placeholder="e.g., reading_list" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" required>

                            <button type="button" class="btn" id="cancelFormBtn">Cancel</button>
                            <button type="button" class="btn primary" id="submitFormBtn">Load Research Document</button>

                document.body.appendChild(dialog);
                dialog.showModal();

                const filenameInput = dialog.querySelector("input[name='filename']");
                const pathInput     = dialog.querySelector("input[name='path']");
                const titleInput    = dialog.querySelector("input[name='title']");
                const authorsInput  = dialog.querySelector("input[name='authors']");
                const dateInput     = dialog.querySelector("input[name='document_date']");
                const topicInput    = dialog.querySelector("textarea[name='topic']");

                dialog.addEventListener("cancel", e => { e.preventDefault(); close(); });

                const submit = async () => {
                    if (!dialog.querySelector("form").reportValidity()) return;
                    close();
                    await handleResumeRequest(sessionId, {
                        filename:      filenameInput.value.trim(),
                        path:          pathInput.value.trim(),
                        title:         titleInput.value.trim(),
                        authors:       authorsInput.value.trim(),
                        document_date: dateInput.value,
                        topic:         topicInput.value.trim(),
                        shelf:         shelfInput.value.trim(),
                    }, promptLabel);
                };
                dialog.querySelector("#submitFormBtn").addEventListener("click", submit);
                [filenameInput, pathInput, titleInput, authorsInput, dateInput, shelfInput].forEach(
                    el => el.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); submit(); } })
                );

            } else if (formType === "load_github_repo") {
                dialog.innerHTML = `
                    <form method="dialog" novalidate autocomplete="off">
                        <label for="gh-account">GitHub Account:</label>
                        <input id="gh-account" name="account" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" required>

                        <label for="gh-repo">Repository Name:</label>
                        <input id="gh-repo" name="repo" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" required>

                        <menu>
                            <button type="button" class="btn" id="cancelFormBtn">Cancel</button>
                            <button type="button" class="btn primary" id="submitFormBtn">Load Repo</button>
                        </menu>
                    </form>
                `;

                dialog.showModal();

                const repoInput = dialog.querySelector("input[name='repo']");

                dialog.addEventListener("cancel", e => { e.preventDefault(); close(); });

                const submit = async () => {

                );

                dialog.querySelector("#cancelFormBtn").addEventListener("click", close);
                dialog.addEventListener("cancel", e => { e.preventDefault(); close(); });

                    await handleResumeRequest(sessionId, {
                        filename:       filenameInput.value.trim(),
                        title:          titleInput.value.trim(),
                        authors:        authorsInput.value.trim(),
                        published_date: dateInput.value,

                dialog.querySelector("#submitFormBtn").addEventListener("click", submit);
                [filenameInput, titleInput, authorsInput, dateInput, shelfInput].forEach(

        // ===== Feed helpers: scoped markdown render, prepend card =====

        // Clamp very large markdown bodies (keep head+tail)
        function clampMarkdown(md, max) {
            const text = String(md ?? "");
            if (!max || text.length <= max) {
                return { text, truncated: false, full: text };
            }
            const head = text.slice(0, Math.floor(max * 0.65));
            const tail = text.slice(-Math.floor(max * 0.25));
            // try to close any dangling code fences in head part
            const fenceOpen = (head.match(/```/g) || []).length % 2 === 1;
            const middle = "\n\n…\n\n<!-- clipped -->\n\n";
            const safeHead = fenceOpen ? (head + "\n```") : head;
            return { text: safeHead + middle + tail, truncated: true, full: text };
        }

        async function renderMarkdownInto(container, mdText) {
            const { text, blocks } = protectMathBlocks(mdText || "");
            let html = marked.parse(text);
            html = restoreMathTokens(html, blocks);
            container.innerHTML = html;
            // highlight just in this container
            if (window.hljs) container.querySelectorAll("pre code").forEach(b => window.hljs.highlightElement(b));
            // MathJax just for this container
            if (window.MathJax?.typesetPromise) {
                if (window.MathJax.typesetClear) MathJax.typesetClear([container]);
                await window.MathJax.typesetPromise([container]).catch(() => {});
            }
        }

        let lastCard = null;

        function fillMetaFooter(card, meta) {
            const footer = card.querySelector(".result-meta");
            if (!footer || !meta) return;
            const parts = [];
            if (meta.total_tokens != null) {
                parts.push(`${meta.total_tokens.toLocaleString()} tokens (${meta.input_tokens.toLocaleString()} in / ${meta.output_tokens.toLocaleString()} out)`);
            }
            if (meta.cost_usd != null) {
                parts.push(`$${meta.cost_usd.toPrecision(4)}`);
            }
            if (meta.trace_url) {
                parts.push(`<a href="${meta.trace_url}" target="_blank" rel="noopener">LangSmith trace</a>`);
            }
            footer.innerHTML = parts.join('<span style="color:#ccc">|</span>');
        }

        async function prependResultCard(userPrompt, markdown) {
            const feed = document.getElementById("results-feed");
            const sc = document.scrollingElement || document.documentElement;
            const before = sc.scrollTop, prevH = sc.scrollHeight;

            const card = document.createElement("section");
            card.className = "result-card";

            const head = document.createElement("div");
            head.className = "result-head";
            head.textContent = new Date().toLocaleString();

            // Outer body for this card
            const body = document.createElement("div");
            body.className = "result-body";

            // Prompt block
            const qDiv = document.createElement("div");
            qDiv.className = "user-question";
            qDiv.innerHTML = `
                <span class="label">Request</span>
                <div class="text"></div>
            `;
            qDiv.querySelector(".text").textContent = userPrompt || "";

            // Answer block (this is where we render markdown)
            const aDiv = document.createElement("div");
            aDiv.className = "markdown-output";

            body.appendChild(qDiv);
            body.appendChild(aDiv);

            const metaFooter = document.createElement("div");
            metaFooter.className = "result-meta";

            card.appendChild(head);
            card.appendChild(body);
            card.appendChild(metaFooter);
            lastCard = card;

            // Insert card before rendering, so MathJax/etc. can run after it's in DOM
            feed.insertBefore(card, feed.firstChild);
            feedCount.val = feed.children.length;
            updateResponsesHeader();

            // Render the answer text into aDiv
            const clamped = clampMarkdown(markdown, FEED_MAX_CHARS);
            await renderMarkdownInto(aDiv, clamped.text);

            if (clamped.truncated) {
                const moreRow = document.createElement("div");
                moreRow.style = "display:flex;justify-content:flex-end;padding:.5rem .9rem;";
                const btn = document.createElement("button");
                btn.className = "btn";
                btn.textContent = "Show full";
                btn.onclick = async () => {
                    btn.disabled = true;
                    await renderMarkdownInto(aDiv, clamped.full);
                    moreRow.remove();
                };
                moreRow.appendChild(btn);
                card.appendChild(moreRow);
            }

            // keep scroll position stable after prepend
            const delta = (sc.scrollHeight - prevH);
            sc.scrollTop = before + delta;

            // Cap feed length
            while (feed.children.length > FEED_MAX_CARDS) {
                feed.removeChild(feed.lastChild);
            }
            feedCount.val = feed.children.length;
            updateResponsesHeader();
        }

        function startNewChat() {
            sessionId.val = null;
            const feed = document.getElementById("results-feed");
            while (feed.firstChild) feed.removeChild(feed.firstChild);
            feedCount.val = 0;
            updateResponsesHeader();
            textValue.val = "";
            if (inputTextareaEl) {
                inputTextareaEl.value = "";
                inputTextareaEl.style.height = "auto";
            }
        }

        function updateResponsesHeader() {
            const h = document.getElementById("responses-header");
            if (!h) return;
            h.style.display = feedCount.val > 0 ? "block" : "none";
        }

        // Main Page
        const handleYadaRequestSubmit = async () => {
            isLoading.val = true;
            statusText.val = "Thinking...";

            // Take a snapshot of what was asked
            const promptBeforeSend = textValue.val;

            try {
                const payload = { input: promptBeforeSend };
                if (sessionId.val) payload.session_id = sessionId.val;

                const response = await fetch(YADA_REQUEST_STREAM, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let msg = `Request failed (${response.status})`;
                    try {
                        const errBody = await response.json();
                        if (errBody?.detail) msg = errBody.detail;
                        else if (errBody?.message) msg = errBody.message;
                    } catch (_) {}
                    throw new Error(msg);
                }

                // Read the SSE stream line by line
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                let currentEvent = "message";
                let resultHandled = false;
                let interruptData = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // keep incomplete last line

                    for (const line of lines) {
                        if (line.startsWith("event:")) {
                            currentEvent = line.slice(6).trim();
                        } else if (line.startsWith("data:")) {
                            const raw = line.slice(5).trim();
                            let parsed;
                            try { parsed = JSON.parse(raw); } catch (_) { continue; }

                            if (currentEvent === "status" && parsed.text) {
                                statusText.val = parsed.text;
                            } else if (currentEvent === "result" && !resultHandled) {
                                resultHandled = true;
                                if (parsed.session_id) sessionId.val = parsed.session_id;
                                statusText.val = "";
                                isLoading.val = false;
                                await prependResultCard(promptBeforeSend, parsed.result ?? "");
                                // SUCCESS: clear textarea
                                textValue.val = "";
                                if (inputTextareaEl) {
                                    inputTextareaEl.value = "";
                                    inputTextareaEl.style.height = "auto";
                                }
                            } else if (currentEvent === "interrupt" && !resultHandled) {
                                resultHandled = true;
                                interruptData = parsed;
                            } else if (currentEvent === "meta") {
                                fillMetaFooter(lastCard, parsed);
                            } else if (currentEvent === "error") {
                                throw new Error(parsed.message || "Unknown stream error");
                            }
                            currentEvent = "message"; // reset after data line
                        }
                    }
                }

                // Show form dialog after stream closes if interrupted
                if (interruptData) {
                    isLoading.val = false;
                    statusText.val = "";
                    showFormDialog(interruptData.form_schema, interruptData.session_id, promptBeforeSend);
                    return;
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
                // DO NOT clear textValue or textarea on error
            } finally {
                isLoading.val = false;
                statusText.val = "";
            }
        };

        // Build the textarea node first so we can keep a reference
        inputTextareaEl = textarea({
            rows: 4,
            placeholder: "Ask something...",
            disabled: () => isLoading.val,
            oninput: e => {
                // auto-resize logic
                e.target.style.height = "auto";
                e.target.style.height = e.target.scrollHeight + "px";
                textValue.val = e.target.value;
            }
        });

        // Now mount the whole app, reusing that same textarea node
        add(document.getElementById("app"),
            div(
                div({ class: "input-container" },
                    // Our referenced textarea node
                    inputTextareaEl,

                    // Submit/Clear row
                    div({ class: "button-wrapper", style: "margin-top: .5rem; display:flex; gap:.5rem;" },
                        button({ class: "btn primary", onclick: handleYadaRequestSubmit, disabled: () => isLoading.val }, "Submit"),
                        button({ class: "btn secondary", onclick: startNewChat, disabled: () => isLoading.val }, "New Chat")
                    ),

                    // Status bar — visible while agent is running
                    div({
                        class: "status-bar",
                        style: () => statusText.val ? "visibility:visible" : "visibility:hidden",
                    },
                        div({ class: "status-spinner" }),
                        span(() => statusText.val),
                    ),

                    // Header toggled dynamically
                    h3({
                        id: "responses-header",
                        style: "display:none; margin-top:4rem;"
                    }, "YADA Responses"),

                    // Feed container
                    div({ id: "results-feed", class: "markdown-feed" })
                )
            )
        );
</script>
</body>
</html>
