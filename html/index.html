<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>YADA</title>
        <!-- highlight.js theme + core -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }
        h2 {
            text-align: left;
        }
        .input-container {
            margin-top: 1rem;
        }
        .input-container textarea {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .input-container textarea::placeholder {
            color: #b7b7b7;
        }
        .bar_chart img {
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }
        .time_series_plot img {
            max-width: 90%;
            display: block;
            margin: 0 auto;
        }
        .input-container .button-wrapper {
            text-align: right;
        }
        .input-container .button-wrapper button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            position: relative;
            overflow: visible;
        }
        .markdown-output pre {
            margin: 12px 0;
            padding: 12px 16px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-width: 100%;
            max-height: 60vh;
            overflow-x: auto;
            overflow-y: auto;
            white-space: pre;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                        "Liberation Mono", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.5;
        }
        .markdown-output pre code {
            white-space: inherit;
        }
        .markdown-output pre code, .markdown-output pre code.hljs {
          background: #f5f5f5 !important;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .button-spinner {
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid #ccc;
            border-top: 2px solid #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5em;
            position: static;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        dialog.modal {
            border: none;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 12px 32px rgba(0,0,0,.25);
            width: min(640px, 92vw);
            max-width: 92vw;
        }
        dialog.modal form {
            display: grid;
            grid-template-columns: 200px minmax(0, 1fr);
            gap: 1rem 1rem;
            align-items: center;
            width: 100%;
        }

        dialog.modal, dialog.modal * { box-sizing: border-box; }
        dialog.modal::backdrop { background: rgba(0,0,0,.45); }
        dialog.modal label { justify-self: end; font-weight: 600; }

        dialog.modal input {
            width: 100%;
            max-width: 100%;
            padding: .55rem .7rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        dialog.modal textarea {
            width: 100%;
            max-width: 100%;
            padding: .55rem .7rem;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: vertical;
        }
        dialog.modal menu {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            margin: .5rem 0 0;
            padding: 0;
        }
        .dialog-input-with-button {
            display: flex;
            align-items: center;
            gap: .5rem;
            width: 100%;
        }
        .dialog-input-with-button input[type="text"] {
            flex: 1 1 auto;
        }
        .btn {
            padding: .5rem 1rem;
            font-size: 1rem;
            border: 1px solid #d0d0d0;
            border-radius: 12px;
            background: #f7f7f7;
            cursor: pointer;
        }
        .btn.primary { 
            background: #111; 
            color: #fff; 
            border-color: #111; 
            border-radius: 12px;
            transition: background .15s ease, transform .15s ease;
        }
        .btn.primary:hover {
            background: #000;
            transform: translateY(-1px);
        }
        .btn.secondary {
            background: #f6f6f6;
            border-color: #c8c8c8;
            border-radius: 12px;
            transition: background .15s ease, box-shadow .15s ease, transform .15s ease;
        }
        .btn.secondary:hover {
            background: #ededed;
            box-shadow: 0 1px 4px rgba(0,0,0,.1);
            transform: translateY(-1px);
        }
        .btn.secondary:disabled {
            opacity: .65;
            box-shadow: none;
            transform: none;
        }
        .btn:disabled { opacity: .7; cursor: not-allowed; }
        .markdown-output {
            text-align: left;
        }
        /* Keep code blocks/inline code left-aligned for readability */
        .markdown-output pre,
        .markdown-output code {
            text-align: left;
        }
        /* Center and constrain images */
        .markdown-output img {
            display: block;
            margin: 0.75rem auto;
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }
        /* Center tables */
        .markdown-output table {
            margin-left: auto;
            margin-right: auto;
        }
        /* Center MathJax display equations */
        .markdown-output mjx-container[jax="CHTML"][display="true"] {
            display: block;
            text-align: center !important;
            margin: 1rem auto !important;
        }
        .markdown-feed {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            /* Constrain answer cards to ~notebook page width (8.5in) */
            max-width: 8.5in;
            margin-left: auto;
            margin-right: auto;
        }
        .result-card {
            border: 1px solid #ddd; border-radius: 10px; background: #fff;
            overflow: hidden;
        }
        .result-head {
            padding: .5rem .75rem; font-weight: 600; background: #f7f7f7; border-bottom: 1px solid #eee;
        }
        .result-body { padding: .75rem .9rem; }
        .dropdown { display: inline-block; position: relative; }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            min-width: 260px;
            padding: .5rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 10px 24px rgba(0,0,0,.1);
            z-index: 1000;
        }
        .dropdown-menu .menu-item {
            display: flex;
            align-items: center;
            gap: .5rem;
            width: 100%;
            text-align: left;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            padding: .45rem .6rem;
            cursor: pointer;
        }
        .dropdown-menu .menu-item:hover { 
            background: #f7f7f7; 
        }
        .user-question {
            border: 1px solid #ddd;
            border-radius: 6px;
            background: #fafafa;
            padding: .5rem .75rem;
            margin-bottom: .75rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: .9rem;
            line-height: 1.4;
        }
        .user-question .label {
            display: block;
            font-size: .7rem;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .03em;
            margin-bottom: .25rem;
        }
        .user-question .text {
            white-space: pre-wrap;
            word-break: break-word;
            color: #000;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0;
            font-size: 0.85rem;
            color: #555;
            min-height: 1.75rem;
        }
        .status-bar .status-spinner {
            flex-shrink: 0;
            width: 0.85em;
            height: 0.85em;
            border: 2px solid #ccc;
            border-top-color: #555;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
    <!-- MathJax v3 config + loader -->
    <script>
    window.MathJax = {
        tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$','$$'], ['\\[','\\]']],
        processEscapes: true,
        processEnvironments: true,
        },
        options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
    };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
    <h2>YADA</h2>
    <div id="app"></div>

    <script type="module">
        import van from "./vendor/van-1.5.5.min.js";
        import { marked } from "./vendor/marked.esm.js";

        marked.setOptions({
            highlight(code, lang) {
                if (window.hljs && lang && window.hljs.getLanguage(lang)) {
                return window.hljs.highlight(code, { language: lang }).value;
                }
                // Fallback: auto-detect if lang missing/unknown
                return window.hljs ? window.hljs.highlightAuto(code).value : code;
            },
            gfm: true,
            breaks: false
        });

        // Protect LaTeX so Marked won't touch underscores/dollars.
        // Order matters: $$...$$ first, then $...$, then \( \), then \[ \]
        // (No lookbehind — works in all modern browsers.)
        function protectMathBlocks(md) {
            const blocks = [];
            const token = i => `@@MATH${i}@@`;
            const re = /(\$\$[\s\S]*?\$\$)|(\$[\s\S]*?\$)|\\\([\s\S]*?\\\)|\\\[[\s\S]*?\\\]/g;
            const text = String(md || "").replace(re, m => {
                const t = token(blocks.length);
                blocks.push(m);
                return t;
            });
            return { text, blocks };
        }

        // Restore tokens with minimal HTML escaping so < and > inside math
        // don't get parsed as tags before MathJax typesets them.
        function restoreMathTokens(html, blocks) {
            let out = String(html || "");
             const esc = s => s
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
            blocks.forEach((m, i) => {
                const t = `@@MATH${i}@@`;
                out = out.split(t).join(esc(m));
            });
            return out;
        }

        // --- Render markdown + code highlight + MathJax ---
        function renderMarkdown(mdText) {
            const el = document.querySelector(".markdown-output");
            if (!el) return;

            // Protect → parse → restore
            const { text, blocks } = protectMathBlocks(mdText || "");
            let html = marked.parse(text);
            html = restoreMathTokens(html, blocks);

            el.innerHTML = html;

            // Code highlight
            if (window.hljs) {
                el.querySelectorAll("pre code").forEach(b => window.hljs.highlightElement(b));
            }

            // MathJax
            if (window.MathJax?.typesetPromise) {
                if (window.MathJax.typesetClear) window.MathJax.typesetClear([el]);
                window.MathJax.typesetPromise([el]).catch(() => {});
            }
        }
        
        const { div, span, textarea, button, h3 } = van.tags;
        const { add, state } = van;

        const textValue = state("");
        const isLoading = state(false);
        const statusText = state("");
        const feedCount = state(0);
        const sessionId = state(null);
        const showLoadMenu = state(false);

        let inputTextareaEl;

        const GITHUB_LOAD_ALL_REPOS = "/api/document/load_all_github_repos";
        const GITHUB_LOAD_REPO = "/api/document/load_github_repo";
        const RESEARCH_NOTE_LOAD = "/api/document/load_research_document";
        const YADA_REQUEST_STREAM = "/api/request/stream";

        // Close dropdown on outside click / ESC
        document.addEventListener("click", () => { showLoadMenu.val = false; });
        document.addEventListener("keydown", (e) => { if (e.key === "Escape") showLoadMenu.val = false; });

        const FEED_MAX_CARDS = 40;
        const FEED_MAX_CHARS = 80000;

        // Load Research Document (Markdown) Dialog
        const handleLoadResearchDocumentDialog = () => {
            const dialog = document.createElement("dialog");
            dialog.className = "modal";
            dialog.innerHTML = `
                <form method="dialog" novalidate autocomplete="off">
                    <label for="rn-filename">Filename:</label>
                    <div class="dialog-input-with-button">
                        <input id="rn-filename" name="filename" type="text" placeholder="document.md" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" required>
                        <input id="rn-file" type="file" accept=".md,.markdown,.txt" style="display:none">
                        <button type="button" class="btn secondary" id="rn-file-btn">Browse…</button>
                    </div>

                    <label for="rn-title">Title:</label>
                    <input id="rn-title" name="title" type="text" placeholder="My Research Library" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text">

                    <label for="rn-authors">Authors:</label>
                    <input id="rn-authors" name="authors" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text"  placeholder="Troy Stribling">

                    <label for="rn-document-date">Date:</label>
                    <input id="rn-document-date" name="document_date" type="date" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text">

                    <label for="rn-topic">Topic:</label>
                    <textarea id="rn-topic" name="topic" rows="3" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="e.g., Signal Processing"></textarea>

                    <label for="rn-shelf">Shelf:</label>
                    <input id="rn-shelf" name="shelf" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" placeholder="e.g., reading_list">

                    <menu>
                        <button type="button" class="btn" id="cancelRNBtn">Cancel</button>
                        <button type="button" class="btn primary" id="loadRNBtn">Load Research Document</button>
                    </menu>
                </form>
            `;
            document.body.appendChild(dialog);
            dialog.showModal();

            const cancelBtn = dialog.querySelector("#cancelRNBtn");
            const loadBtn   = dialog.querySelector("#loadRNBtn");

            const filenameInput     = dialog.querySelector("input[name='filename']");
            const titleInput        = dialog.querySelector("input[name='title']");
            const authorsInput      = dialog.querySelector("input[name='authors']");
            const dateInput         = dialog.querySelector("input[name='document_date']");
            const topicInput        = dialog.querySelector("textarea[name='topic']");
            const shelfInput        = dialog.querySelector("input[name='shelf']");
            const fileInput         = dialog.querySelector("#rn-file");
            const fileButton        = dialog.querySelector("#rn-file-btn");

            if (fileButton && fileInput) {
                fileButton.addEventListener("click", () => fileInput.click());
                fileInput.addEventListener("change", () => {
                    if (fileInput.files && fileInput.files[0]) {
                        filenameInput.value = fileInput.files[0].name;
                    }
                });
            }

            requestAnimationFrame(() => filenameInput.focus());

            const close = () => { dialog.close(); dialog.remove(); };
            cancelBtn.addEventListener("click", close);
            dialog.addEventListener("cancel", e => { e.preventDefault(); close(); }); // Esc key

            const submit = async () => {
                // Only filename is required for now
                if (!dialog.querySelector("form").reportValidity()) return;
                const payload = {
                    filename:       filenameInput.value.trim(),
                    title:          titleInput.value.trim(),
                    authors:        authorsInput.value.trim(),
                    date:           dateInput.value,
                    topic:          topicInput.value.trim(),
                    shelf:         shelfInput.value.trim()
                };
                const prev = loadBtn.textContent;
                loadBtn.disabled = true;
                loadBtn.textContent = "Loading…";
                try {
                    const res = await fetch(RESEARCH_NOTE_LOAD, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(result?.detail || result?.message || `Request failed (${res.status})`);
                    alert(result.status || "Research document load requested.");
                } catch (err) {
                    alert(`Error loading research document: ${err.message || err}`);
                } finally {
                    loadBtn.disabled = false;
                    loadBtn.textContent = prev;
                    close();
                }
            };
            loadBtn.addEventListener("click", submit);
            [filenameInput, titleInput, authorsInput, dateInput, shelfInput].forEach(el => el.addEventListener("keydown", e => {if (e.key === "Enter") { e.preventDefault(); submit(); }}));
        };

        // ===== Feed helpers: scoped markdown render, prepend card =====

        // Clamp very large markdown bodies (keep head+tail)
        function clampMarkdown(md, max) {
            const text = String(md ?? "");
            if (!max || text.length <= max) {
                return { text, truncated: false, full: text };
            }
            const head = text.slice(0, Math.floor(max * 0.65));
            const tail = text.slice(-Math.floor(max * 0.25));
            // try to close any dangling code fences in head part
            const fenceOpen = (head.match(/```/g) || []).length % 2 === 1;
            const middle = "\n\n…\n\n<!-- clipped -->\n\n";
            const safeHead = fenceOpen ? (head + "\n```") : head;
            return { text: safeHead + middle + tail, truncated: true, full: text };
        }

        async function renderMarkdownInto(container, mdText) {
            const { text, blocks } = protectMathBlocks(mdText || "");
            let html = marked.parse(text);
            html = restoreMathTokens(html, blocks);
            container.innerHTML = html;
            // highlight just in this container
            if (window.hljs) container.querySelectorAll("pre code").forEach(b => window.hljs.highlightElement(b));
            // MathJax just for this container
            if (window.MathJax?.typesetPromise) {
                if (window.MathJax.typesetClear) MathJax.typesetClear([container]);
                await window.MathJax.typesetPromise([container]).catch(() => {});
            }
        }

        async function prependResultCard(userPrompt, markdown) {
            const feed = document.getElementById("results-feed");
            const sc = document.scrollingElement || document.documentElement;
            const before = sc.scrollTop, prevH = sc.scrollHeight;

            const card = document.createElement("section");
            card.className = "result-card";

            const head = document.createElement("div");
            head.className = "result-head";
            head.textContent = new Date().toLocaleString();

            // Outer body for this card
            const body = document.createElement("div");
            body.className = "result-body";

            // Prompt block
            const qDiv = document.createElement("div");
            qDiv.className = "user-question";
            qDiv.innerHTML = `
                <span class="label">Request</span>
                <div class="text"></div>
            `;
            qDiv.querySelector(".text").textContent = userPrompt || "";

            // Answer block (this is where we render markdown)
            const aDiv = document.createElement("div");
            aDiv.className = "markdown-output";

            body.appendChild(qDiv);
            body.appendChild(aDiv);

            card.appendChild(head);
            card.appendChild(body);

            // Insert card before rendering, so MathJax/etc. can run after it's in DOM
            feed.insertBefore(card, feed.firstChild);
            feedCount.val = feed.children.length;
            updateResponsesHeader();

            // Render the answer text into aDiv
            const clamped = clampMarkdown(markdown, FEED_MAX_CHARS);
            await renderMarkdownInto(aDiv, clamped.text);

            if (clamped.truncated) {
                const moreRow = document.createElement("div");
                moreRow.style = "display:flex;justify-content:flex-end;padding:.5rem .9rem;";
                const btn = document.createElement("button");
                btn.className = "btn";
                btn.textContent = "Show full";
                btn.onclick = async () => {
                    btn.disabled = true;
                    await renderMarkdownInto(aDiv, clamped.full);
                    moreRow.remove();
                };
                moreRow.appendChild(btn);
                card.appendChild(moreRow);
            }

            // keep scroll position stable after prepend
            const delta = (sc.scrollHeight - prevH);
            sc.scrollTop = before + delta;

            // Cap feed length
            while (feed.children.length > FEED_MAX_CARDS) {
                feed.removeChild(feed.lastChild);
            }
            feedCount.val = feed.children.length;
            updateResponsesHeader();
        }

        function startNewChat() {
            sessionId.val = null;
            const feed = document.getElementById("results-feed");
            while (feed.firstChild) feed.removeChild(feed.firstChild);
            feedCount.val = 0;
            updateResponsesHeader();
            textValue.val = "";
            if (inputTextareaEl) {
                inputTextareaEl.value = "";
                inputTextareaEl.style.height = "auto";
            }
        }

        function updateResponsesHeader() {
            const h = document.getElementById("responses-header");
            if (!h) return;
            h.style.display = feedCount.val > 0 ? "block" : "none";
        }

        // Load Repository Dialog
        const handleLoadGitHubRepoDialog = () => {
            const dialog = document.createElement("dialog");
            dialog.className = "modal";
            dialog.innerHTML = `
                <form method="dialog" novalidate autocomplete="off">
                    <label for="gh-account">GitHub Account:</label>
                    <input id="gh-account" name="account" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text" required>
                    <label for="gh-repo">Repository Name:</label>
                    <input id="gh-repo" name="repo" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" inputmode="text"  required>
                    <menu>
                        <button type="button" class="btn" id="cancelRepoBtn">Cancel</button>
                        <button type="button" class="btn primary" id="loadRepoBtn">Load Repo</button>
                    </menu>
                </form>
            `;
            document.body.appendChild(dialog);
            dialog.showModal();

            const cancelBtn = dialog.querySelector("#cancelRepoBtn");
            const loadBtn   = dialog.querySelector("#loadRepoBtn");
            const accInput  = dialog.querySelector("input[name='account']");
            const repoInput = dialog.querySelector("input[name='repo']");

            const saved = localStorage.getItem("gh_account");
            if (saved) accInput.value = saved;

            requestAnimationFrame(() => accInput.focus());

            const close = () => { dialog.close(); dialog.remove(); };
            cancelBtn.addEventListener("click", close);
            dialog.addEventListener("cancel", e => { e.preventDefault(); close(); }); // Esc key

            const submit = async () => {
                const account = accInput.value.trim();
                const repo    = repoInput.value.trim();
                if (!account || !repo) {
                    [accInput, repoInput].forEach(el => {
                        if (!el.value.trim()) el.style.borderColor = "#d33";
                    });
                    return;
                }
                const prev = loadBtn.textContent;
                loadBtn.disabled = true;
                loadBtn.textContent = "Loading…";
                try {
                    const res = await fetch(GITHUB_LOAD_REPO, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ account, repo })
                    });
                    const result = await res.json().catch(() => ({}));
                    alert(result.status || "Repo load requested.");
                } catch (err) {
                    alert(`Error loading repo: ${err.message}`);
                } finally {
                    loadBtn.disabled = false;
                    loadBtn.textContent = prev;
                    close();
                }
            };

            loadBtn.addEventListener("click", submit);
            [accInput, repoInput].forEach(el => el.addEventListener("keydown", e => {
                if (e.key === "Enter") { e.preventDefault(); submit(); }
            }));
        };

        // Load All Repositories
        const gitHubLoadAllReposStatus = state(""); 
        const gitHubLoadAllReposLoading = state(false);

        const handleGitHubLoadAllRepos = async () => {
            gitHubLoadAllReposLoading.val = true;
            try {
                const response = await fetch(GITHUB_LOAD_ALL_REPOS, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });
                const data = await response.json();
                alert(data.status || "gitHubLoadAllRepos request sent.");
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                gitHubLoadAllReposLoading.val = false;
            }
        };

        // Main Page
        const handleYadaRequestSubmit = async () => {
            isLoading.val = true;
            statusText.val = "Thinking...";

            // Take a snapshot of what was asked
            const promptBeforeSend = textValue.val;

            try {
                const payload = { input: promptBeforeSend };
                if (sessionId.val) payload.session_id = sessionId.val;

                const response = await fetch(YADA_REQUEST_STREAM, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    let msg = `Request failed (${response.status})`;
                    try {
                        const errBody = await response.json();
                        if (errBody?.detail) msg = errBody.detail;
                        else if (errBody?.message) msg = errBody.message;
                    } catch (_) {}
                    throw new Error(msg);
                }

                // Read the SSE stream line by line
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";
                let currentEvent = "message";
                let resultHandled = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // keep incomplete last line

                    for (const line of lines) {
                        if (line.startsWith("event:")) {
                            currentEvent = line.slice(6).trim();
                        } else if (line.startsWith("data:")) {
                            const raw = line.slice(5).trim();
                            let parsed;
                            try { parsed = JSON.parse(raw); } catch (_) { continue; }

                            if (currentEvent === "status" && parsed.text) {
                                statusText.val = parsed.text;
                            } else if (currentEvent === "result" && !resultHandled) {
                                resultHandled = true;
                                if (parsed.session_id) sessionId.val = parsed.session_id;
                                statusText.val = "";
                                isLoading.val = false;
                                await prependResultCard(promptBeforeSend, parsed.result ?? "");
                                // SUCCESS: clear textarea
                                textValue.val = "";
                                if (inputTextareaEl) {
                                    inputTextareaEl.value = "";
                                    inputTextareaEl.style.height = "auto";
                                }
                            } else if (currentEvent === "error") {
                                throw new Error(parsed.message || "Unknown stream error");
                            }
                            currentEvent = "message"; // reset after data line
                        }
                    }
                }
            } catch (err) {
                alert(`Error: ${err.message}`);
                // DO NOT clear textValue or textarea on error
            } finally {
                isLoading.val = false;
                statusText.val = "";
            }
        };

        // Build the textarea node first so we can keep a reference
        inputTextareaEl = textarea({
            rows: 4,
            placeholder: "Ask something...",
            oninput: e => {
                // auto-resize logic
                e.target.style.height = "auto";
                e.target.style.height = e.target.scrollHeight + "px";
                textValue.val = e.target.value;
            }
        });

        // Now mount the whole app, reusing that same textarea node
        add(document.getElementById("app"),
            div(
                div({ class: "input-container" },
                    // Button row
                    div({ class: "button-wrapper", style: "margin-bottom: 1.0rem; text-align: left; position: relative;" },
                        div({ class: "dropdown" },
                            button(
                                {
                                    class: "btn",
                                    style: "min-width: 175px;",
                                    onclick: (e) => { e.stopPropagation(); showLoadMenu.val = !showLoadMenu.val; }
                                },
                                "Load Documents ", span({ style: "opacity:.6; margin-left:.25rem;" }, "▾")
                            ),
                            div(
                                { class: "dropdown-menu", style: () => showLoadMenu.val ? "display:block" : "display:none" },
                                // Update GitHub Repos
                                button(
                                    {
                                        class: "menu-item",
                                        onclick: async (e) => {
                                            e.stopPropagation();
                                            showLoadMenu.val = false;
                                            await handleGitHubLoadAllRepos();
                                        }
                                    },
                                    span({
                                        class: "button-spinner",
                                        style: () => (gitHubLoadAllReposLoading.val ? "display: inline-block;" : "display: none;")
                                    }),
                                    "Update GitHub Repos"
                                ),
                                // Update GitHub Repo
                                button(
                                    {
                                        class: "menu-item",
                                        onclick: (e) => { e.stopPropagation(); showLoadMenu.val = false; handleLoadGitHubRepoDialog(); }
                                    },
                                    "Update GitHub Repo"
                                ),
                                // Load Research Document
                                button(
                                    {
                                        class: "menu-item",
                                        onclick: (e) => { e.stopPropagation(); showLoadMenu.val = false; handleLoadResearchDocumentDialog(); }
                                    },
                                    "Load Research Document"
                                )
                            )
                        )
                    ),

                    // Our referenced textarea node
                    inputTextareaEl,

                    // Submit/Clear row
                    div({ class: "button-wrapper", style: "margin-top: .5rem; display:flex; gap:.5rem;" },
                        button({ class: "btn primary", onclick: handleYadaRequestSubmit }, "Submit"),
                        button({ class: "btn secondary", onclick: startNewChat, disabled: () => isLoading.val }, "New Chat")
                    ),

                    // Status bar — visible while agent is running
                    div({
                        class: "status-bar",
                        style: () => statusText.val ? "display:flex" : "display:none",
                    },
                        div({ class: "status-spinner" }),
                        span(() => statusText.val),
                    ),

                    // Header toggled dynamically
                    h3({
                        id: "responses-header",
                        style: "display:none; margin-top:4rem;"
                    }, "YADA Responses"),

                    // Spinner overlay
                    div({
                        id: "spinner-overlay",
                        style: () => isLoading.val
                            ? "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.5);z-index:9999;display:flex;justify-content:center;align-items:center;"
                            : "display:none"
                    },
                        div({ class: "spinner" })
                    ),

                    // Feed container
                    div({ id: "results-feed", class: "markdown-feed" })
                )
            )
        );
</script>
</body>
</html>
