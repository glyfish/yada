<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<head>
    <meta charset="UTF-8" />
    <title>YADA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }
        h2 {
            text-align: left;
        }
        .input-container {
            margin-top: 1rem;
        }
        .input-container textarea {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .bar_chart img {
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }
        .time_series_plot img {
            max-width: 90%;
            display: block;
            margin: 0 auto;
        }
        .input-container .button-wrapper {
            text-align: right;
        }
        .input-container .button-wrapper button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
        }
        .markdown-output {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .button-spinner {
            display: inline-block;
            width: 1em;
            height: 1em;
            border: 2px solid #ccc;
            border-top: 2px solid #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 0.5em;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <h2>YADA</h2>
    <div id="app"></div>

    <script type="module">
        import van from "./vendor/van-1.5.5.min.js";
        import { marked } from "./vendor/marked.esm.js";

        const { div, textarea, button, h3 } = van.tags;
        const { add, state } = van;

        const textValue = state("");
        const markdownHTML = state("");
        const isLoading = state(false);
        
        const handleSubmit = async () => {
            isLoading.val = true;
            try {
                const response = await fetch("/api/request", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input: textValue.val })
                });
                const data = await response.json();
                markdownHTML.val = data.result;
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                isLoading.val = false;
            }
        };

        const cloneStatus = state(""); 
        const cloneLoading = state(false);

        const handleClone = async () => {
            cloneLoading.val = true;
            try {
                const response = await fetch("/api/github/clone", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" }
                });
                const data = await response.json();
                // If data.status is a string (e.g., "OK")
                alert(data.status || "Clone request sent.");
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                cloneLoading.val = false;
            }
        };

        add(document.getElementById("app"),
            div(
                div({ class: "input-container" },
                    // Button row (own wrapper and margin)
                    div({ class: "button-wrapper", style: "margin-bottom: 1.0rem; text-align: left;" },
                        button(
                            { 
                                onclick: handleClone, 
                                disabled: () => cloneLoading.val, 
                                style: "margin-right: 0.5rem; min-width: 175px; position:relative;"
                            },
                            () => cloneLoading.val ? div({ class: "button-spinner" }) : null,
                            "Update GitHub Repos"
                        )
                    ),
                    // Textarea on its own row
                    textarea({
                        rows: 4,
                        placeholder: "Ask something...",
                        oninput: e => {
                            e.target.style.height = 'auto';
                            e.target.style.height = e.target.scrollHeight + 'px';
                            textValue.val = e.target.value;
                        }
                    }),
                    // Submit button row
                    div({ class: "button-wrapper", style: "margin-top: 0.5rem;" },
                        button({ onclick: handleSubmit }, "Submit")
                    ),
                    h3({ style: () => markdownHTML.val ? "display:block" : "display:none" }, "YADA Response"),
                    div({
                        id: "spinner-overlay",
                        style: () => isLoading.val
                            ? "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.5);z-index:9999;display:flex;justify-content:center;align-items:center;"
                            : "display:none"
                    },
                        div({ class: "spinner" })
                    ),
                    div(
                        { class: "markdown-output", style: () => markdownHTML.val ? "display:block" : "display:none" },
                        div({ innerHTML: () => marked.parse(markdownHTML.val) })
                    )
                )
            )
        );

</script>
</body>
</html>
