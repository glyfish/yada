<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>YADA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: auto;
        }
        h2 {
            text-align: left;
        }
        .input-container {
            margin-top: 1rem;
        }
        .input-container textarea {
            width: 100%;
            padding: 0.5rem;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 0.5rem;
            overflow: hidden;
        }
        .input-container .button-wrapper {
            text-align: right;
        }
        .input-container .button-wrapper button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            cursor: pointer;
        }
        .markdown-output {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <h2>YADA</h2>
    <div id="app"></div>

    <script type="module">
        import van from "./vendor/van-1.5.5.min.js";
        import { marked } from "./vendor/marked.esm.js";

        const { div, textarea, button, h3 } = van.tags;
        const { add, state } = van;

        const textValue = state("");
        const markdownHTML = state("");
        const isLoading = state(false);
        
        const handleSubmit = async () => {
            isLoading.val = true;
            try {
                const response = await fetch("/api/request", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input: textValue.val })
                });
                const data = await response.json();
                markdownHTML.val = data.result;
            } catch (err) {
                alert(`Error: ${err.message}`);
            } finally {
                isLoading.val = false;
            }
        };

        add(document.getElementById("app"),
            div(
                div({ class: "input-container" },
                    textarea({
                        rows: 4,
                        placeholder: "Ask something...",
                        oninput: e => {
                            e.target.style.height = 'auto';
                            e.target.style.height = e.target.scrollHeight + 'px';
                            textValue.val = e.target.value;
                        }
                    }),
                    div({ class: "button-wrapper" },
                        button({ onclick: handleSubmit }, "Submit")
                    ),
                    h3({ style: () => markdownHTML.val ? "display:block" : "display:none" }, "YADA Response"),
                    div({
                        id: "spinner-overlay",
                        style: () => isLoading.val
                            ? "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.5);z-index:9999;display:flex;justify-content:center;align-items:center;"
                            : "display:none"                    },
                        div({ class: "spinner" })
                    ),
                    div(
                       { class: "markdown-output", style: () => markdownHTML.val ? "display:block" : "display:none" },
                       div({ innerHTML: () => marked.parse(markdownHTML.val) })
                   )                
                )
            )
        );    
</script>
</body>
</html>
