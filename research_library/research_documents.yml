  authors: Troy Stribling, D. A. Roberts, M. L. Goldstein
  published_date: Dec 01, 1996
  topic: We investigate an idealized model of the evolution of magnetohydrodynamic (MHD) scale velocity and magnetic field fluctuations in the equatorial region of the inner heliosphere at solar minimum.
  shelf: publications

- filename: decay_of_magnetic_helicity_in_ideal_magnetohydrody-0d96203e-56c1-43f8-a854-9b2b1cce56ea.md
  path: research_library/Troy Publications/decay_of_magnetic_helicity_in_ideal_magnetohydrody-0d96203e-56c1-43f8-a854-9b2b1cce56ea.md
