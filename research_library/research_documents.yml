  authors: Troy Stribling, W. H. Matthaeus
  published_date: Jan 01, 1995
  topic: We show that the magnetic helicity associated with fluctuations in homogeneous three-dimensional incompressible ideal magnetohydrodynamics (MHD) with a mean magnetic field decays in time due to nonlinear processes.
  shelf: publications

- filename: magnetic_helicity_in_magnetohydrodynamic_turbulence-98f8acfe-6c8f-4332-a2cc-778a8a71738c.md
  path: research_library/Troy Publications/magnetic_helicity_in_magnetohydrodynamic_turbulence-98f8acfe-6c8f-4332-a2cc-778a8a71738c.md
  title: Magnetic helicity in magnetohydrodynamic turbulence with a mean magnetic field
  authors: Troy Stribling, S. Oughton, W. H. Matthaeus
  published_date: May 01, 1995
  topic: A computational investigation of magnetic helicity of the fluctuating magnetic field in ideal and freely decaying three-dimensional (3-D) magnetohydrodynamics (MHD) in the presence of a uniform mean magnetic field is performed.
  shelf: publications

- filename: nonlinear-decay-of-magnetic-helicity-in-magnetohydrodynamic-tur-ff53a3a0-9d8a-4c20-b7e6-b16d6849be5c.md
  path: research_library/Troy Publications/nonlinear-decay-of-magnetic-helicity-in-magnetohydrodynamic-tur-ff53a3a0-9d8a-4c20-b7e6-b16d6849be5c.md
  title: Nonlinear decay of magnetic helicity in magnetohydrodynamic turbulence with a mean magnetic field
  authors: Troy Stribling, William H. Matthaeus
  published_date: Mar 01 1994
  topic: We show that the magnetic helicity associated with fluctuations in homogeneous incompressible magnetohydrodynamic (MHD) turbulence with a mean magnetic field decays in time because of nonlinear processes.
  shelf: publications

- filename: relaxation-in-two-dimensions-navier-stokes-2e5dbbdb-cc85-4eac-aec4-3ca6d6047729.md
  path: research_library/Troy Publications/relaxation-in-two-dimensions-navier-stokes-2e5dbbdb-cc85-4eac-aec4-3ca6d6047729.md
  title: Relaxation in two dimensions and the "sinh-Poisson" equation
  authors: Troy Stribling
  published_date: Nov 01, 1990
  topic: Long-time states of a turbulent, decaying, two-dimensional, Navier-Stokes flow are shown numerically to relax toward maximum-entropy configurations, as defined by the "sinhPoisson" equation. 
  shelf: publications

- filename: relaxation-processes-in-a-low-order-model-1a6d9fb5-6ac7-4655-be93-915ed8a9f4bb.md
  path: research_library/Troy Publications/relaxation-processes-in-a-low-order-model-1a6d9fb5-6ac7-4655-be93-915ed8a9f4bb.md
  title: Relaxation processes in a low-order three-dimensional magnetohydrodynamics model
  authors: Troy Stribling, William H. Matthaeus
  published_date: Nov 01, 1990
  topic: The selective decay and dynamic alignment relaxation theories are used to interpret the time asymptotic behavior of a Galerkin model of three-dimensional (3-D) magnetohydrodynamics (MHD). 
  shelf: publications

- filename: selective-decay-and-coherent-vortices-81352ab2-0081-49dd-9708-037faca72a46.md
  path: research_library/Troy Publications/selective-decay-and-coherent-vortices-81352ab2-0081-49dd-9708-037faca72a46.md
  title: Selective Decay and Coherent Vortices in Two-Dimensional Incompressible Turbulence
  authors: William H. Matthaeus, W. Troy Stribling, Daniel Martinez, and Sean Oughton
  published_date: May 14 1990
  topic: Numerical solution of two-dimensional incompressible hydrodynamics shows that states of near minimal ratio of enstrophy to energy can be attained in times short compared with the flow decay time, confirming the simplest turbulent selective decay conjecture, and suggesting that coherent vortex structures do not terminate nonlinear processes.
  shelf: publications

- filename: statistics-of-ideal-3d-mhd-cb493e37-ff14-403f-b8ef-00237ecb6635.md
  path: research_library/Troy Publications/statistics-of-ideal-3d-mhd-cb493e37-ff14-403f-b8ef-00237ecb6635.md
  title: Statistical properties of ideal three-dimensional magnetohydrodynamics
  authors: Troy Stribling, W. H. Matthaeus
  published_date: Feb 8, 1990
  topic: Classical Gibbs ensemble methods are used to study the spectral structure of three-dimensional ideal magnetohydrodynamics (MHD) in periodic geometry.
  shelf: publications

- filename: surface-topography-and-imedence-d897598a-fcb8-4701-a7b3-1c0ac15785c4.md
  path: research_library/Troy Publications/surface-topography-and-imedence-d897598a-fcb8-4701-a7b3-1c0ac15785c4.md
  title: Surface Topography and Impedance of Metal-Electrolyte Interfaces
  authors: J. B. Bates, Y. T. Chu, Troy Stribling
  published_date: Jun 22, 1987
  topic: The small-signal impedance of chemical cells with "blocking" electrodes is dominated at low frequencies ( $f \leqq 100 \mathrm{~Hz}$ ) by the impedance of the metal-electrolyte interfaces which is accurately represented by $Z_{i}=A(j \omega)^{-n}$. The frequency exponent $n, n<1$, is sensitive to the texture of the interface, and several recent theories have been proposed that relate $n$ with the fractal dimension $\bar{d}$ of the rough interface. We find no correlation between $n$ and $\bar{d}$ from experiments using aqueous electrolytes and metal and semiconductor electrodes.
  shelf: publications

- filename: the_evolution_of_magnetic_helicity_in_compressible-c08d2af4-f961-4dfa-b589-02469adc5d15.md
  path: research_library/Troy Publications/the_evolution_of_magnetic_helicity_in_compressible-c08d2af4-f961-4dfa-b589-02469adc5d15.md
  title: The Evolution of Magnetic Helicity in Compressible Magnetohydrodynamics with a Mean Magnetic Field
  authors: Sanjoy Ghosh, Troy Stribling, W. H. Matthaeus, Melvyn Goldstein
  published_date: Jan 01, 1995
  topic: The solar wind is often modeled as an incompressible magnetofluid. Such a description has been substantiated for two-dimensional (2-D) geometries through compressible magnetohydrodynamic (MHD) simulations which show that many features of incompressible 2-D MHD turbulent relaxation are preserved at subsonic, but non-negligible Mach numbers
  shelf: publications

# E.T. Jaynes Selected Works
- filename: carnot-8d44967b-c078-4902-980c-f834d26088a5.md
  path: research_library/Jaynes/carnot-8d44967b-c078-4902-980c-f834d26088a5.md
  title: The Evolution of Carnot’s Principle
  authors: E. T. Jaynes
  published_date: Jul 08, 1996
  topic: Review of historical development of the Second Law of Thermodynamics.
  shelf: jaynes

- filename: gibbs-vs-boltzmann-a02e7d2f-a719-4856-a904-0d09b2c7e74c.md
  path: research_library/Jaynes/gibbs-vs-boltzmann-a02e7d2f-a719-4856-a904-0d09b2c7e74c.md
  title: Gibbs vs Boltzmann Entropies
  authors: E. T. Jaynes
  published_date: Jan 01, 1963
  topic: The status of the Gibbs and Boltzmann expressions for entropy has been a matter of some confusion in the literature.
  shelf: jaynes

- filename: irreversible-statistical-mechanics-28c93502-9a14-4e9b-8d9c-8a64cd9815a6.md
  path: research_library/Jaynes/irreversible-statistical-mechanics-28c93502-9a14-4e9b-8d9c-8a64cd9815a6.md
  title: Irreversible Statistical Mechanics
  authors: E. T. Jaynes
  published_date:  Nov 05, 1964
  topic: A general formalism for calculation of irreversible processes, analogous to the paxtition sum algorithe of equilibrium theory, is presented. Mathematically, it is a generalization of the procedure by which Gibbs constructed his amonical and grand canonical ensembles, in which the partition function is witended to a partition functional.
  shelf: jaynes

- filename: macroscopic-prediction-040aedd5-7267-456c-9b1d-daddebed9029.md
  path: research_library/Jaynes/macroscopic-prediction-040aedd5-7267-456c-9b1d-daddebed9029.md
  title: Macroscopic Prediction
  authors: E. T. Jaynes
  published_date: Jan 01, 1985
  topic: Although physicists believe that we have understood the laws of microphysics quite well for fifty years, macrophenomena are observed to have a rich variety that is very hard to understand. We see not only lifeless thermal equilibrium and irreversible approaches to it, but lively behavior such as that of cyclic chemical reactions, lasers, self-organizing systems, biological systems.
  shelf: jaynes

- filename: marginalization-and-prior-probabilities-24ed13f8-a8bc-4818-a5f6-a2bd6b4394fc.md
  path: research_library/Jaynes/marginalization-and-prior-probabilities-24ed13f8-a8bc-4818-a5f6-a2bd6b4394fc.md
  title: Marginalization and Prior Probabilities
  authors: E. T. Jaynes
  published_date: Jan 01, 1980
  topic: A recent article of Dawid, Stone, and Zidek (1973) notes two Bayesian calculation methods--the first using an improper prior, the second avoiding it--that one feels intuitively ought to lead to the same result, but in general do not. This "marginalization paradox" has been interpreted widely as revealing a fundamental inconsistency in the common Bayesian practice of using improper priors to express prior ignorance.
  shelf: jaynes

- filename: minumum-entropy-production-de599502-c603-40b8-a7be-34a1de8352fc.md
  path: research_library/Jaynes/minumum-entropy-production-de599502-c603-40b8-a7be-34a1de8352fc.md
  title: The Minimum Entropy Production Principle
  authors: E. T. Jaynes
  published_date: Jan 01, 1980
  topic: It seems intuitively reasonable that Gibbs' variational principle determining the conditions of heterogeneous equilibrium can be generalized to nonequilibrium conditions. That is, a nonequilibrium steady state should be the one that makes some kind of generalized entropy production stationary; and even in the presence of irreversible fluxes, the condition for migrational equilibrium should still be the equality of some generalized chemical potentials.
  shelf: jaynes

- filename: poincare-recursion-b2000704-887b-4027-b163-af20aee96a5a.md
  path: research_library/Jaynes/poincare-recursion-b2000704-887b-4027-b163-af20aee96a5a.md
  title: Poincare Recurrence Times and Statistical Mechanics
  authors: E. T. Jaynes
  published_date: Jul 01, 1957
  topic: The theory of almost-periodic functions is applied to the problem of the relation, conjectured by the Earenfests, between Poincare reaurrence times and the time over which averages of phase functions mast be taken in order to approximate their limiting values for infinite time. It is concluded that the necessary averaging times might be very much longer than the Poincare periods. 
  shelf: jaynes

- filename: predictive-statistical-mechanics-7bafb3ce-0662-4a1a-91ce-fb89188bb6bb.md
  path: research_library/Jaynes/predictive-statistical-mechanics-7bafb3ce-0662-4a1a-91ce-fb89188bb6bb.md
  title: Predictive Statistical Mechanics
  authors: E. T. Jaynes
  published_date: Jan 01, 1983
  topic: This workshop is concerned with two topics, foundations of quantum theory and of irreversible statistical mechanics, which might appear quite different. Yet the current problems in both fields are basically the same, two different aspects of a deep conceptual hangup that permeates not only physics, but all fields that use probability theory.
  shelf: jaynes

- filename: prior-information-in-inference-265d0158-9676-490c-8cc6-b8ef363c725e.md
  path: research_library/Jaynes/prior-information-in-inference-265d0158-9676-490c-8cc6-b8ef363c725e.md
  title: Prior Information in Inference
  authors: E. T. Jaynes
  published_date: Jan 01, 1983
  topic: For many years the writer has carried an evangelical message to physicists, telling them "Statisticians have learned many important things that physicists ought to know about but don't". Here we face in the opposite direction and note some things physicists have learned about inference, that statisticians might find useful.
  shelf: jaynes

- filename: prior-probabilities-cc1bea82-f141-4185-9bcc-976f9bce0a44.md
  path: research_library/Jaynes/prior-probabilities-cc1bea82-f141-4185-9bcc-976f9bce0a44.md
  title: Prior Probabilities
  authors: E. T. Jaynes
  published_date: Jan 01, 1983
  topic: In decision theory, mathematical analysis shows that once the sampling distributions, loss function, and sample are specified, the only remaining basis for a choice among different admissible decisions lies in the prior probabilities. Therefore, the logical foundations of decision theory cannot be put in fully satisfactory form until the old problem of arbitrariness (sometimes called "subjectiveness") in assigning prior probabilities is resolved.
  shelf: jaynes

- filename: probablility-as-logic-745d2827-334d-4614-b95f-042357f32150.md
  path: research_library/Jaynes/probablility-as-logic-745d2827-334d-4614-b95f-042357f32150.md
  title: Probability as Logic
  authors: E. T. Jaynes
  published_date: Jan 01, 2003
  topic: At the 1988 workshop we called attention to the "Mind Projection Fallacy" which is present in all fields that use probability. Here we give a more complete discussion showing why probabilities need not correspond to physical causal influences, or "propensities" affecting mass phenomena. Probability theory is far more useful if we recognize that probabilities express fundamentally logical inferences pertaining to individual cases. We note several examples of the difference this makes in real applications.
  shelf: jaynes

- filename: rational-of-maximum-entropy-methods-02f50d50-65fc-4409-b7be-e2aaa8b34738.md
  path: research_library/Jaynes/rational-of-maximum-entropy-methods-02f50d50-65fc-4409-b7be-e2aaa8b34738.md
  title: On The Rationale of Maximum-Entropy Methods
  authors: E. T. Jaynes
  published_date: Jan 01, 1982
  topic: We discuss the relations between maximum-entropy (MAXENT) and other methods of spectral analysis such as the Schuster, Blackman-Tukey, maximum-likelihood, Bayesian, and Autoregressive (AR, ARMA, or ARIMA) models, emphasizing that they are not in conflict, but rather are appropriate in different problems.
  shelf: jaynes

- filename: some-ramdom-observations-1e22e5c0-3968-4f23-94df-af346b9bba54.md
  path: research_library/Jaynes/some-ramdom-observations-1e22e5c0-3968-4f23-94df-af346b9bba54.md
  title: Some Random Observations
  authors: E. T. Jaynes
  published_date: Jan 01, 1982
  topic: When told of the plan to devote an issue of Syntheses to the principle of maximum entropy (PME), my first reaction was puzzlement as to why philosophers should be so interested in it. Then a plausible reason appeared to be that PME has been perceived (correctly, in my view) as a small but nonnegligible part of a fundamental revolution in thought now taking place.
  shelf: jaynes

