- filename: decoherent-histories-quantum-mechanics-with-one-_real_-fine-gra-0a916406-9313-4b39-8c4e-5c274d6f1aac.md
  path: research_library/Reading List/decoherent-histories-quantum-mechanics-with-one-_real_-fine-gra-0a916406-9313-4b39-8c4e-5c274d6f1aac.md
  title: Decoherent Histories Quantum Mechanics with One "Real" Fine-Grained History
  authors: Murray Gell-Mann, James B. Hartle
  published_date: Nov 30, 2011
  topic: Decoherent histories quantum theory is reformulated with the assumption that there is one "real" fine-grained history, specified in a preferred complete set of sum-over-histories variables. This real history is described by embedding it in an ensemble of comparable imagined fine-grained histories, not unlike the familiar ensemble of statistical mechanics.
  shelf: reading_list

- filename: election-predictions-as-martingales-17bad42c-2245-41a9-b819-1a31ba2b5d75.md
  path: research_library/Reading List/election-predictions-as-martingales-17bad42c-2245-41a9-b819-1a31ba2b5d75.md
  title: Election Predictions as Martingales, An Arbitrage Approach
  authors: Nassim Nicholas Taleb
  published_date: Oct 01, 2017
  topic: A standard result in quantitative finance is that when the volatility of the underlying security increases, arbitrage pressures push the corresponding binary option to trade closer to 50%, and become less variable over the remaining time to expiration. Counterintuitively, the higher the uncertainty of the underlying security, the lower the volatility of the binary option. 
  shelf: reading_list

- filename: evaluating-gambles-using-dynamics-c0fa4bff-1717-4678-b90c-1a790840d9b1.md
  path: research_library/Reading List/evaluating-gambles-using-dynamics-c0fa4bff-1717-4678-b90c-1a790840d9b1.md
  title: Evaluating gambles using dynamics
  authors: Ole Peters, Murray Gell-Mann
  published_date: May 3, 2014
  topic: Gambles are random variables that model possible changes in monetary wealth. Classic decision theory transforms money into utility through a utility function and defines the value of a gamble as the expectation value of utility changes. Utility functions aim to capture individual psychological characteristics, but their generality limits predictive power.
  shelf: reading_list

- filename: larger-than-one-probabilities-in-finance-4e697507-2018-49c6-9fe7-a3af1a06dbc8.md
  path: research_library/Reading List/larger-than-one-probabilities-in-finance-4e697507-2018-49c6-9fe7-a3af1a06dbc8.md
  title: Larger than One Probabilities in Mathematical and Practical Finance
  authors: Mark Burgin, Gunter Meissner
  published_date: Feb 29, 2016
  topic: Traditionally probability is considered as a function that takes values in the interval [0, 1]. However, researchers found that negative, as well as larger than 1 probabilities could be a useful tool in making financial modeling more exact and flexible. Here we show how larger than 1 probabilities could be handy for financial modeling. 
  shelf: reading_list

- filename: monte-carlo-methods-in-statistical-mechanics-409becac-f2e9-48f2-9d3e-0924d6e66036.md
  path: research_library/Reading List/monte-carlo-methods-in-statistical-mechanics-409becac-f2e9-48f2-9d3e-0924d6e66036.md
  title: Monte Carlo Methods in Statistical Mechanics, Foundations and New Algorithms
  authors: Alan D. Sokal
  published_date: Sep 01, 1996
  topic: The goal of these lectures is to give an introduction to current research on Monte Carlo methods in statistical mechanics and quantum field theory.
  shelf: reading_list

- filename: quantum-probability-explanation-for-violations-of-rational-deci-d4d738ae-7a92-45ff-b7d3-cf57bb3e1c3a.md
  path: research_library/Reading List/quantum-probability-explanation-for-violations-of-rational-deci-d4d738ae-7a92-45ff-b7d3-cf57bb3e1c3a.md
  title: A quantum probability explanation for violations of 'rational' decision theory
  authors: Emmanuel M. Pothos, Jerome R. Busemeyer
  published_date: Mar 25, 2009
  topic: Two experimental tasks in psychology, the two-stage gambling game and the Prisoner's Dilemma game, show that people violate the sure thing principle of decision theory. These paradoxical findings have resisted explanation by classical decision theory for over a decade. A quantum probability model, based on a Hilbert space representation and Schrödinger's equation, provides a simple and elegant explanation for this behaviour.
  shelf: reading_list

- filename: spatial-statistics-and-bayesian-computation-7a43eb00-390e-4b10-8efd-26a5534ab136.md
  path: research_library/Reading List/spatial-statistics-and-bayesian-computation-7a43eb00-390e-4b10-8efd-26a5534ab136.md
  title: Spatial Statistics and Bayesian Computation
  authors: Julian Besag, Peter J. Green
  published_date: May 6, 1992
  topic: SUMMARY Markov chain Monte Carlo (MCMC) algorithms, such as the Gibbs sampler, have provided a Bayesian inference machine in image analysis and in other areas of spatial statistics for several years, founded on the pioneering ideas of Ulf Grenander. More recently, the observation that hyperparameters can be included as part of the updating schedule and the fact that almost any multivariate distribution is equivalently a Markov random field has opened the way to the use of MCMC in general Bayesian computation.
  shelf: reading_list

- filename: the-ergodicity-problem-in-economics-1d62d50a-15b5-42fb-9df0-6b615656ce7f.md
  path: research_library/Reading List/the-ergodicity-problem-in-economics-1d62d50a-15b5-42fb-9df0-6b615656ce7f.md
  title: The ergodicity problem in economics
  authors: Ole Peters
  published_date: '2019-12-02'
  topic: The ergodic hypothesis is a key analytical device of equilibrium statistical
    mechanics. It underlies the assumption that the time average and the expectation
    value of an observable are the same. Where it is valid, dynamical descriptions
    can often be replaced with much simpler probabilistic ones - time is essentially
    eliminated from the models.
  shelf: reading_list

- filename: the-evolution-of-markov-chain-monte-carlo-methods-8bc75170-c6d4-419b-8275-49726a639471.md
  path: research_library/Reading List/the-evolution-of-markov-chain-monte-carlo-methods-8bc75170-c6d4-419b-8275-49726a639471.md
  title: The Evolution of Markov Chain Monte Carlo Methods
  authors: Matthew Richey
  published_date: '2010-05-01'
  topic: This algorithm is actually a collection of related algorithms-Metropolis-Hastings,
    simulated annealing, and Gibbs sampling-together known as Markov chain Monte Carlo
    (MCMC) methods. The original MCMC method, the Metropolis algorithm, arose in physics,
    and now its most current variants are central to computational statistics. Along
    the way from physics to statistics the algorithm appeared in-and was transformed
    by-applied mathematics and computer science.
  shelf: reading_list

