- filename: alfvenic-pertrurbations-in-3d-mhd-b0a7e44f-f1ed-4e02-a39e-c952444e12c7.md
  path: research_library/Troy Publications/alfvenic-pertrurbations-in-3d-mhd-b0a7e44f-f1ed-4e02-a39e-c952444e12c7.md
