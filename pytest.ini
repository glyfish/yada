[pytest]
pythonpath = .
asyncio_mode = auto
testpaths = tests
markers =
    integration: touches Postgres/Chroma (not run by default)
    llm: calls a real model (costs money, nondeterministic)
filterwarnings =
    # Third-party: langchain-core's tool introspection uses Pydantic's deprecated
    # __fields__ shim. Not our code and not fixable without a langchain upgrade —
    # ignore just this one message so our own warnings stay visible.
    ignore:The `__fields__` attribute is deprecated:DeprecationWarning
