  - id: EQTA18
    title: Total Equity to Total Assets, Banks with Total Assets up to $300M, Mountain
      Census Division (DISCONTINUED)
    observation_start: '1988-01-01'
    observation_end: '2020-07-01'
    frequency: Quarterly, End of Period
    frequency_short: Q
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2020-12-10T14:52:10-06:00'
    popularity: 1
    notes: 'This series is discontinued and will no longer be updated. Additional
      consolidated data is available on the FDIC''s Bank Data and Statistics (https://www.fdic.gov/bank/statistical/).


      For each size category, the sum of equity held by banks with average assets
      greater than zero is divided by average assets. Equity equals Total Equity Capital
      call item RCFD3210. Total Assets equals call item RCFD2170.

      The asset classes are determined by using Average Total Assets call item RCFD2170
      less than $300M.

      Geographic location for Mountain Census Division is determined by the Physical
      State Code call item RSSD9210 IN (4,8,16,30,32,35,49,56), where the number codes
      represent Arizona, Colorado, Idaho, Montana, Nevada, New Mexico, Utah, and Wyoming
      respectively.


      Users are advised to use the Federal Reserve Board of Governors'' data dictionary
      (https://www.federalreserve.gov/apps/mdrm/data-dictionary) to retrieve detailed
      information for specific call items.


      This series is calculated by the Federal Reserve Bank of St. Louis using raw
      data that are collected by the FFIEC. Raw data can be found at https://cdr.ffiec.gov/public/.'
