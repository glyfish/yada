    notes: 'This series represents the total number of building permits for 1-unit
      structure types. The 1-unit structure type is a single-family home or house.
      A single-family home or house types include fully detached, semidetached (semidetached,
      side-by-side), row houses, and townhouses. For attached units, each must be
      separated from the adjacent unit by a ground-to-roof wall in order to be classified
      as a single-family structure. These units also must not share heating/air-conditioning
      systems or utilities. Units built on top of one another and those built side-by-side
      that do not have a ground-to-roof wall and/or have common facilities (i.e.,
      attic, basement, heating plant, plumbing, etc.) are not included under single-family
      structures.


      The Federal Reserve Bank of St. Louis seasonally adjusts this series by using
      the ''statsmodels'' library from Python with default parameter settings. The
      package uses the U.S. Bureau of the Census X-13ARIMA-SEATS Seasonal Adjustment
      Program. More information on the ''statsmodels'' X-13ARIMA-SEATS package can
      be found here (https://www.statsmodels.org/dev/generated/statsmodels.tsa.x13.x13_arima_analysis.html).
      More information on X-13ARIMA-SEATS can be found here (https://www.census.gov/data/software/x13as.html).


      Many series include both seasonally adjusted (SA) and not seasonally adjusted
      (NSA) data. Occasionally, updates to the data will not include sufficient seasonal
      factors to trigger a seasonal adjustment. In these cases, the NSA series will
      be updated normally; but the SA series will also be updated with the NSA data.
      The NSA series can be located here here (https://fred.stlouisfed.org/series/CMATBP1FH).


      Some seasonally adjusted series may exhibit negative values because they are
      created from a seasonal adjustment process regardless of the actual meaning
      or interpretation of the given indicator.'
