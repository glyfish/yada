  - id: LAURD870000000000006A
    title: Civilian Labor Force in West South Central Census Division
    observation_start: '1976-01-01'
    observation_end: '2024-01-01'
    frequency: Annual
    frequency_short: A
    units: Persons
    units_short: Persons
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2025-03-05T14:44:58-06:00'
    popularity: 0
    notes: 'These data come from the Current Population Survey (CPS), also known as
      the household survey.


      Civilian Labor Force includes all persons in the civilian noninstitutional population
      ages 16 and older classified as either employed or unemployed.


      Employed persons are all persons who, during the reference week (the week including
      the 12th day of the month), (a) did any work as paid employees, worked in their
      own business or profession or on their own farm, or worked 15 hours or more
      as unpaid workers in an enterprise operated by a member of their family, or
      (b) were not working but who had jobs from which they were temporarily absent
      because of vacation, illness, bad weather, childcare problems, maternity or
      paternity leave, labor-management dispute, job training, or other family or
      personal reasons, whether or not they were paid for the time off or were seeking
      other jobs. Each employed person is counted only once, even if he or she holds
      more than one job.


      Unemployed persons are all persons who had no employment during the reference
      week, were available for work, except for temporary illness, and had made specific
      efforts to find employment some time during the 4 week-period ending with the
      reference week. Persons who were waiting to be recalled to a job from which
      they had been laid off need not have been looking for work to be classified
      as unemployed.


      For more details, see the release''s <a href=https://www.bls.gov/lau/laufaq.htm>frequently
      asked questions</a>.'
  - id: LLRNPT17
    title: Assets at Banks whose ALLL exceeds their Nonperforming Loans, Banks with
      Total Assets up to $300M, West South Central Census Division (DISCONTINUED)
    observation_start: '1988-01-01'
    observation_end: '2020-07-01'
    frequency: Quarterly, End of Period
    frequency_short: Q
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2020-12-10T14:50:01-06:00'
    popularity: 1
    notes: 'This series is discontinued and will no longer be updated. Additional
      consolidated data is available on the FDIC''s Bank Data and Statistics (https://www.fdic.gov/bank/statistical/).


      Each bank is classified by whether the ratio of its allowance for loan and lease
      losses (ALLL) to nonperforming loans is greater than one. For each size category,
      the sum of all assets held by banks where this ratio is greater than one is
      divided by the sum all assets held by banks in the class. The allowance for
      loan and lease losses is the sum of Allowance for Loan and Lease Losses call
      item RCFD3123 and Allocated Transfer Risk Reserves call item RCFD3128. Total
      nonperforming loans equals the sum of Total Loans and Lease Finance Receivables,
      Nonaccrual call item RCFD1403 and Total Loans and Lease Financing Receivables,
      Past due 90 Days or More and Still Accruing call item RCFD1407.

      The asset classes are determined by using Average Total Assets call item RCFD2170
      less than $300M.

      Geographic location for West South Central Census Division is determined by
      the Physical State Code call item RSSD9210 IN (5,22,40,48), where the number
      codes represent Arkansas, Louisiana, Oklahoma, and Texas respectively.


      Users are advised to use the Federal Reserve Board of Governors'' data dictionary
      (https://www.federalreserve.gov/apps/mdrm/data-dictionary) to retrieve detailed
      information for specific call items.


      This series is calculated by the Federal Reserve Bank of St. Louis using raw
      data that are collected by the FFIEC. Raw data can be found at https://cdr.ffiec.gov/public/.'
