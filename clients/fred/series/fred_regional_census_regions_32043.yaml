  - id: NPCMCM21
    title: Nonperforming Commercial Loans (past due 90+ days plus nonaccrual) to Commercial
      Loans, Banks with Total Assets from $300M to $1B, New England Census Division
      (DISCONTINUED)
    observation_start: '1988-01-01'
    observation_end: '2020-07-01'
    frequency: Quarterly, End of Period
    frequency_short: Q
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2020-12-10T14:49:25-06:00'
    popularity: 1
    notes: 'This series is discontinued and will no longer be updated. Additional
      consolidated data is available on the FDIC''s Bank Data and Statistics (https://www.fdic.gov/bank/statistical/).


      Percentage of nonperforming commercial loans equals total nonperforming commercial
      loans divided by total commercial loans. Nonperforming commercial loans are
      those commercial loans that bank managers classify as 90-days or more past due
      or nonaccrual in the call report. Precisely, nonperforming commercial loans
      equals the sum of Commercial and Industrial Loans to U.S. Addressees (Domicile)
      Past Due 90 Days or More and Still Accruing call item RCFD1252; Commercial and
      Industrial Loans to U.S. Addressees (Domicile), Nonaccrual call item RCFD1253;
      Commercial and Industrial Loans to Non-U.S. Addressees (Domicile) Past Due 90
      Days or More and Still Accruing call item RCFD1255; Commercial and Industrial
      Loans to Non-U.S. Addressees (Domicile), Nonaccrual call item RCFD1256; Commercial
      (Time and Demand) and All Other Loans Past Due 90 Days or More and Still Accruing
      call item RCON1223; Commercial (Time and Demand) and All Other Loans, Nonaccrual
      call item RCON1224; Commercial and Industrial Loans Past Due 90 Days or More
      and Still Accruing call item RCON1607; and Commercial and Industrial Loans,
      Nonaccrual call item RCON1608. Total commercial loans equals Commercial and
      Industrial Loans call item RCFD1766.

      The asset classes are determined by using Average Total Assets call item RCFD2170
      greater than $300M and less than $1B.

      Geographic location for New England Census Division is determined by the Physical
      State Code call item RSSD9210 IN (9,23,25,33,44,50), where the number codes
      represent Connecticut, Maine, Massachusetts, New Hampshire, Rhode Island, and
      Vermont respectively.


