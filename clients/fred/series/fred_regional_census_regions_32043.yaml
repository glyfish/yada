  - id: LLRNPT14
    title: Assets at Banks whose ALLL exceeds their Nonperforming Loans, Banks with
      Total Assets up to $300M, West North Central Census Division (DISCONTINUED)
    observation_start: '1988-01-01'
    observation_end: '2020-07-01'
    frequency: Quarterly, End of Period
    frequency_short: Q
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2020-12-10T14:50:02-06:00'
    popularity: 1
    notes: 'This series is discontinued and will no longer be updated. Additional
      consolidated data is available on the FDIC''s Bank Data and Statistics (https://www.fdic.gov/bank/statistical/).


      Each bank is classified by whether the ratio of its allowance for loan and lease
      losses (ALLL) to nonperforming loans is greater than one. For each size category,
      the sum of all assets held by banks where this ratio is greater than one is
      divided by the sum all assets held by banks in the class. The allowance for
      loan and lease losses is the sum of Allowance for Loan and Lease Losses call
      item RCFD3123 and Allocated Transfer Risk Reserves call item RCFD3128. Total
      nonperforming loans equals the sum of Total Loans and Lease Finance Receivables,
      Nonaccrual call item RCFD1403 and Total Loans and Lease Financing Receivables,
      Past due 90 Days or More and Still Accruing call item RCFD1407.

      The asset classes are determined by using Average Total Assets call item RCFD2170
      less than $300M.

      Geographic location for West North Central Census Division is determined by
      the Physical State Code call item RSSD9210 IN (19,20,27,29,31,38,46), where
      the number codes represent Iowa, Kansas, Minnesota, Missouri, Nebraska, North
      Dakota, and South Dakota respectively.


      Users are advised to use the Federal Reserve Board of Governors'' data dictionary
      (https://www.federalreserve.gov/apps/mdrm/data-dictionary) to retrieve detailed
      information for specific call items.


      This series is calculated by the Federal Reserve Bank of St. Louis using raw
      data that are collected by the FFIEC. Raw data can be found at https://cdr.ffiec.gov/public/.'
