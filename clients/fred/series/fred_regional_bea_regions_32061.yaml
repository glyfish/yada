    seasonal_adjustment_short: NSA
    last_updated: '2025-09-26T09:23:43-05:00'
    popularity: 3
    notes: 'Personal consumption expenditures of a given area divided by the resident
      population of the area.


      Products that cannot be stored or inventoried that are usually consumed at the
      place and time of their purchase.


      This (SIC) division includes establishments primarily engaged in providing a
      wide variety of services for individuals, business and government establishments,
      and other organizations. Hotels and other lodging places; establishments providing
      personal, business, repair, and amusement services; health, legal, engineering,
      and other professional services; educational institutions; membership organizations,
      and other miscellaneous services, are included.


      Establishments which provide specialized services closely allied to activities
      covered in other divisions are classified in such divisions.For more information
      about this release go to http://www.bea.gov/newsreleases/regional/pce/pce_newsrelease.htm.'
