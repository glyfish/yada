      It captures the probability of default of a country''s banking system, calculated
      as a weighted average of the z-scores of a country''s individual banks (the
      weights are based on the individual banks'' total assets). Z-score compares
      a bank''s buffers (capitalization and returns) with the volatility of those
      returns. It is estimated as (ROA+(equity/assets))/sd(ROA); sd(ROA) is the standard
      deviation of ROA. (Calculated from underlying bank-by-bank unconsolidated data
      from Bankscope)


