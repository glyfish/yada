  - id: DDOI031WA066NWDB
    title: H-Statistic in Banking Market for World (DISCONTINUED)
    observation_start: '2010-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Index
    units_short: Index
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-29T13:02:51-05:00'
    popularity: 1
    notes: 'A measure of the degree of competition in the banking market. It measures
      the elasticity of banks revenues relative to input prices. Under perfect competition,
      an increase in input prices raises both marginal costs and total revenues by
      the same amount, and hence the H-statistic equals 1. Under a monopoly, an increase
      in input prices results in a rise in marginal costs, a fall in output, and a
      decline in revenues, leading to an H-statistic less than or equal to 0. When
      H is between 0 and 1, the system operates under monopolistic competition.


      A measure of the degree of competition in the banking market. It measures the
      elasticity of banks revenues relative to input prices. Under perfect competition,
      an increase in input prices raises both marginal costs and total revenues by
      the same amount, and hence the H-statistic equals 1. Under a monopoly, an increase
      in input prices results in a rise in marginal costs, a fall in output, and a
      decline in revenues, leading to an H-statistic less than or equal to 0. When
      H is between 0 and 1, the system operates under monopolistic competition. (For
      more information, see Panzar and Rosse 1982, 1987). (Calculated from underlying
      bank-by-bank data from Bankscope)


      Source Code: GFDD.OI.03'
  - id: DDOI041WA066NWDB
    title: Lerner Index in Banking Market for World (DISCONTINUED)
    observation_start: '1996-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Index
    units_short: Index
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-30T07:49:05-05:00'
    popularity: 1
    notes: 'A measure of market power in the banking market. It compares output pricing
      and marginal costs (that is, markup). An increase in the Lerner index indicates
      a deterioration of the competitive conduct of financial intermediaries.


      A measure of market power in the banking market. It is defined as the difference
      between output prices and marginal costs (relative to prices). Prices are calculated
      as total bank revenue over assets, whereas marginal costs are obtained from
      an estimated translog cost function with respect to output. Higher values of
      the Lerner index indicate less bank competition. Lerner Index estimations follow
      the methodology described in Demirgüç-Kunt and Martínez Pería (2010). (Calculated
      from underlying bank-by-bank data from Bankscope)


      Source Code: GFDD.OI.04'
  - id: DDOI051WA156NWDB
    title: Boone Indicator in Banking Market for World (DISCONTINUED)
    observation_start: '1999-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Index
    units_short: Index
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-29T15:01:30-05:00'
    popularity: 1
    notes: 'A measure of degree of competition based on profit-efficiency in the banking
      market. It is calculated as the elasticity of profits to marginal costs. An
      increase in the Boone indicator implies a deterioration of the competitive conduct
      of financial intermediaries.


      A measure of degree of competition, calculated as the elasticity of profits
      to marginal costs. To obtain the elasticity, the log of profits (measured by
      return on assets) is regressed on the log of marginal costs. The estimated coefficient
      (computed from the first derivative of a trans-log cost function) is the elasticity.
      The rationale behind the indicator is that higher profits are achieved by more-efficient
      banks. Hence, the more negative the Boone indicator, the higher the degree of
      competition is because the effect of reallocation is stronger. Estimations of
      the Boone indicator in this database follow the methodology used by Schaeck
      and Cihák 2010 with a modification to use marginal costs instead of average
      costs. Regional estimates of the Boone indicator pool the bank data by regions
      (for more information, see Hay and Liu 1997; Boone 2001; Boone, Griffith, and
      Harrison 2005). (Calculated from underlying bank-by-bank data from Bankscope)


      Source Code: GFDD.OI.05'
