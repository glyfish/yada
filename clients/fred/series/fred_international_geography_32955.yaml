  - id: DDDI011WA156NWDB
    title: Private Credit by Deposit Money Banks to GDP for World (DISCONTINUED)
    observation_start: '1960-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-29T13:08:36-05:00'
    popularity: 2
    notes: 'The financial resources provided to the private sector by domestic money
      banks as a share of GDP. Domestic money banks comprise commercial banks and
      other financial institutions that accept transferable deposits, such as demand
      deposits. Private credit by deposit money banks and other financial institutions
      to GDP, calculated using the following deflation method: {(0.5)*[Ft/P_et + Ft-1/P_et-1]}/[GDPt/P_at]
      where F is credit to the private sector, P_e is end-of period CPI, and P_a is
      average annual CPI. Raw data are from the electronic version of the IMF''s International
      Financial Statistics. Private credit by deposit money banks (IFS line 22d and
      FOSAOP); GDP in local currency (IFS line NGDP); end-of period CPI (IFS line
      PCPI); and average annual CPI is calculated using the monthly CPI values (IFS
      line PCPI). (International Monetary Fund, International Financial Statistics,
      and World Bank GDP estimates)


      Source Code: GFDD.DI.01'
  - id: DDDI021WA156NWDB
    title: Deposit Money Bank Assets to GDP for World (DISCONTINUED)
    observation_start: '1973-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-29T15:01:47-05:00'
    popularity: 1
    notes: 'Total assets held by deposit money banks as a share of GDP. Assets include
      claims on domestic real nonfinancial sector which includes central, state and
      local governments, nonfinancial public enterprises and private sector. Deposit
      money banks comprise commercial banks and other financial institutions that
      accept transferable deposits, such as demand deposits.


      Claims on domestic real nonfinancial sector by deposit money banks as a share
      of GDP, calculated using the following deflation method: {(0.5)*[Ft/P_et + Ft-1/P_et-1]}/[GDPt/P_at]
      where F is deposit money bank claims, P_e is end-of period CPI, and P_a is average
      annual CPI. Raw data are from the electronic version of the IMF''s International
      Financial Statistics. Deposit money bank assets (IFS lines 22, a-d); GDP in
      local currency (IFS line 99B..ZF or, if not available, line 99B.CZF); end-of
      period CPI (IFS line 64M..ZF or, if not available, 64Q..ZF); and annual CPI
      (IFS line 64..ZF). (International Monetary Fund, International Financial Statistics,
      and World Bank GDP estimates)


      Source Code: GFDD.DI.02'
  - id: DDDI031WA156NWDB
    title: Non-Bank Financial Institutions' Assets to GDP for World (DISCONTINUED)
    observation_start: '1960-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-30T08:06:30-05:00'
    popularity: 2
    notes: 'Total assets held by financial institutions that do not accept transferable
      deposits but that perform financial intermediation by accepting other types
      of deposits or by issuing securities or other liabilities that are close substitutes
      for deposits as a share of GDP. It covers institutions such as saving and mortgage
      loan institutions, post-office savings institution, building and loan associations,
      finance companies that accept deposits or deposit substitutes, development banks,
      and offshore banking institutions. Assets include claims on domestic real nonfinancial
      sector such as central-, state- and local government, nonfinancial public enterprises
      and private sector.


      Claims on domestic real nonfinancial sector by other financial institutions
      as a share of GDP, calculated using the following deflation method: {(0.5)*[Ft/P_et
      + Ft-1/P_et-1]}/[GDPt/P_at] where F is other financial institutions'' claims,
      P_e is end-of period CPI, and P_a is average annual CPI. Raw data are from the
      electronic version of the IMF''s International Financial Statistics. Non-bank
      financial institutions assets (IFS lines 42, a-d and h); GDP in local currency
      (IFS line 99B..ZF or, if not available, line 99B.CZF); end-of period CPI (IFS
      line 64M..ZF or, if not available, 64Q..ZF); and annual CPI (IFS line 64..ZF).
      (International Monetary Fund, International Financial Statistics, and World
      Bank GDP estimates)


      Source Code: GFDD.DI.03'
  - id: DDDI041WA156NWDB
    title: Deposit Money Bank Assets to Deposit Money Bank Assets and Central Bank
      Assets for World (DISCONTINUED)
    observation_start: '1960-01-01'
    observation_end: '2015-01-01'
    frequency: Annual
    frequency_short: A
    units: Percent
    units_short: '%'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2017-08-29T13:08:47-05:00'
    popularity: 1
    notes: 'Total assets held by deposit money banks as a share of sum of deposit
      money bank and Central Bank claims on domestic nonfinancial real sector. Assets
      include claims on domestic real nonfinancial sector which includes central,
      state and local governments, nonfinancial public enterprises and private sector.
      Deposit money banks comprise commercial banks and other financial institutions
      that accept transferable deposits, such as demand deposits.


      Raw data are from the electronic version of the IMF''s International Financial
      Statistics. IFS lines 12 and 22, a-d). (International Monetary Fund, International
      Financial Statistics)


      Source Code: GFDD.DI.04'
  - id: DDDI051WA156NWDB
