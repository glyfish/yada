  - id: CASHBL1WA188A
    title: Cash surplus/deficit (% of GDP) for the World
    observation_start: '1990-01-01'
    observation_end: '2013-01-01'
    frequency: Annual
    frequency_short: A
    units: Percent of GDP
    units_short: '% of GDP'
    seasonal_adjustment: Not Seasonally Adjusted
    seasonal_adjustment_short: NSA
    last_updated: '2018-09-27T13:31:36-05:00'
    popularity: 2
    notes: 'Cash surplus or deficit is revenue (including grants) minus expense, minus
      net acquisition of nonfinancial assets. In the 1986 GFS manual nonfinancial
      assets were included under revenue and expenditure in gross terms. This cash
      surplus or deficit is closest to the earlier overall budget balance (still missing
      is lending minus repayments, which are now a financing item under net acquisition
      of financial assets).


      World Bank sources: International Monetary Fund, Government Finance Statistics
      Yearbook and data files, and World Bank and OECD GDP estimates.


      Source Indicator: GC.BAL.CASH.GD.ZS'
